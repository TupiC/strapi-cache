name: Test

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]

jobs:
    unit-test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"

            - name: Install dependencies
              run: |
                  npm ci || npm install

            - name: Run unit tests
              run: npm test -- --run

            - name: Build project
              run: npm run build

            - name: Verify project
              run: npm run verify

    integration-test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"

            - name: Install dependencies
              run: |
                  npm ci || npm install

            - name: Run integration tests
              run: npm run test:integration
