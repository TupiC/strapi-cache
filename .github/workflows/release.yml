name: Release

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            publish_only:
                description: "Skip release-please and publish directly"
                required: false
                type: boolean
                default: false

jobs:
    release-please:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        if: ${{ !inputs.publish_only }}
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        steps:
            - name: Run release-please
              uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
              id: release
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  release-type: node

    publish-npm:
        runs-on: ubuntu-latest
        needs: release-please
        if: ${{ always() && (needs.release-please.outputs.release_created ||
            inputs.publish_only) }}
        permissions:
            id-token: write # Required for OIDC trusted publishing
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: "https://registry.npmjs.org"
                  cache: "npm"

            # npm 11.5.1+ is required for trusted publishing (OIDC). npm 10 falls back to
            # NODE_AUTH_TOKEN only and often surfaces broken auth as 404 on PUT.
            - name: Update npm
              run: npm install -g npm@11.5.1

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            # Trusted publishing: leave NPM_TOKEN unset on this repo. Token fallback: set
            # repo secret NPM_TOKEN (automation token with publish + bypass 2FA).
            - name: Publish to npm
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
